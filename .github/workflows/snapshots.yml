name: Generate canvas snapshots

on:
  workflow_run:
    workflows: ["Deploy branch preview"]
    types: [completed]

concurrency:
  group: snapshots-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  generate-snapshots:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Configure git for HTTPS deps
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Generate snapshots
        run: npx storyboard snapshots --changed-only

      - name: Commit and push snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/canvas/snapshots/ src/canvas/ || true
          git diff --cached --quiet && echo "No snapshot changes" && exit 0

          git commit -m "chore: update canvas snapshots [skip ci]" --no-verify
          git push
