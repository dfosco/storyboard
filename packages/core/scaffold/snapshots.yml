name: Generate canvas snapshots

on:
  workflow_run:
    workflows: ["Deploy branch preview"]
    types: [completed]

concurrency:
  group: snapshots-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  generate-snapshots:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch at triggering SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Generate snapshots
        run: npx storyboard snapshots --changed-only

      - name: Commit and push snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/canvas/snapshots/ src/canvas/ || true
          git diff --cached --quiet && echo "No snapshot changes" && exit 0

          BRANCH="${{ github.event.workflow_run.head_branch }}"
          git commit -m "chore: update canvas snapshots [skip ci]" --no-verify
          git push origin HEAD:"refs/heads/${BRANCH}"
